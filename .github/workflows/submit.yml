name: submit

on:
  push:
    branches:
      - main

env:
  # Flip to 'true' once the Google Play service account is verified in EAS credentials.
  SUBMIT_ANDROID: 'false'

jobs:
  workflow-config:
    runs-on: ubuntu-latest
    outputs:
      submit_android: ${{ steps.config.outputs.submit_android }}
    steps:
      - id: config
        run: echo "submit_android=${{ env.SUBMIT_ANDROID }}" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS and Android
        run: eas build --platform all --profile production --non-interactive --wait

  submit-ios:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store Connect
        run: eas submit --platform ios --profile production --latest --non-interactive --wait

  submit-android:
    needs: [build, workflow-config]
    if: needs.workflow-config.outputs.submit_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to Google Play
        run: eas submit --platform android --profile production --latest --non-interactive --wait
