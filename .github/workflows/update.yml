# Publishes a JS/asset OTA update to the production channel.
# Mutually exclusive with build-and-submit.yml: runs only when a push does not
# touch native/build config paths (see paths-ignore below).
name: Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - app.json
      - app.config.js
      - package.json
      - package-lock.json
      - eas.json
      - plugins/**
      - ios/**
      - android/**
      - assets/images/icons/markers/**
      - .github/**
      - '**/*.md'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS Update
        run: eas update --channel production --non-interactive --message "${{ github.event.head_commit.message }}"
