# Publishes a JS/asset OTA update to the production channel.
# Skipped when any native/build config file changed in the commit (see detect job),
# so mixed commits only run build-and-submit.yml.
name: Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
      - '**/*.md'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - app.json
              - app.config.js
              - package.json
              - package-lock.json
              - eas.json
              - plugins/**
              - ios/**
              - android/**
              - assets/images/icons/markers/**

  update:
    needs: detect
    if: needs.detect.outputs.native != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS Update
        run: eas update --channel production --non-interactive --message "${{ github.event.head_commit.message }}"
