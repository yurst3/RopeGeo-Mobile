# Builds production binaries and submits to the App Store / Google Play.
# Mutually exclusive with update.yml on branch pushes: runs only when native or
# build config paths change, on version tags, or when started manually.
# Requires expo.version in app.json to be bumped on push (manual runs skip bump check).
# Always requires app.json expo.version and package.json version to match.
name: Build and Submit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app.json
      - app.config.js
      - package.json
      - package-lock.json
      - eas.json
      - plugins/**
      - ios/**
      - android/**
      - assets/images/icons/markers/**
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify app version
        run: |
          set -euo pipefail
          CURRENT=$(jq -r '.expo.version' app.json)
          PACKAGE_VERSION=$(jq -r '.version' package.json)

          if [ "$CURRENT" != "$PACKAGE_VERSION" ]; then
            echo "::error::expo.version in app.json ($CURRENT) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi
          echo "app.json and package.json versions aligned: $CURRENT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run; skipping version bump check."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$CURRENT" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match expo.version ($CURRENT) in app.json."
              exit 1
            fi
            echo "Tag matches expo.version: $CURRENT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit; skipping version bump check."
            exit 0
          fi

          PREVIOUS=$(git show "${BEFORE}:app.json" 2>/dev/null | jq -r '.expo.version // empty' || true)
          if [ -z "$PREVIOUS" ]; then
            echo "Previous commit had no app.json version; skipping version bump check."
            exit 0
          fi

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "::error::expo.version in app.json is still $CURRENT. Bump expo.version before starting a store build."
            exit 1
          fi

          HIGHER=$(printf '%s\n' "$PREVIOUS" "$CURRENT" | sort -V | tail -n1)
          if [ "$HIGHER" != "$CURRENT" ]; then
            echo "::error::expo.version ($CURRENT) is not greater than the previous version ($PREVIOUS)."
            exit 1
          fi

          echo "Version bumped: $PREVIOUS -> $CURRENT"

  build-ios:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS
        run: eas build --platform ios --profile production --non-interactive --wait

  submit-ios:
    needs: build-ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit to App Store Connect
        run: eas submit --platform ios --profile production --latest --non-interactive --wait

  build-android:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android
        run: eas build --platform android --profile production --non-interactive --wait

  submit-android:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit to Google Play
        run: eas submit --platform android --profile production --latest --non-interactive --wait
